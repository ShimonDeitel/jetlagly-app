name: Jetlagly
options:
  bundleIdPrefix: com.shimondeitel.jetlag
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Jetlagly:
    type: application
    platform: iOS
    sources:
      - path: Jetlagly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jetlag
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Jetlagly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  JetlaglyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JetlaglyTests
      - path: Jetlagly.storekit
    dependencies:
      - target: Jetlagly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jetlag.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  JetlaglyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JetlaglyUITests
    dependencies:
      - target: Jetlagly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.jetlag.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Jetlagly:
    build:
      targets:
        Jetlagly: all
        JetlaglyTests: [test]
        JetlaglyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Jetlagly.storekit
    test:
      config: Debug
      storeKitConfiguration: Jetlagly.storekit
      targets:
        - JetlaglyTests
        - JetlaglyUITests
    archive:
      config: Release
